name: Download & Cache Images

on:
  workflow_dispatch: # run manually from the Actions tab

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create images folder
        run: mkdir -p assets/images

      - name: Download all images
        run: |
          declare -A IMAGES
          # Logo
          IMAGES["logo.svg"]="https://cdn.prod.website-files.com/60a938bc0e890bb09b993113/6450158f1bef6bd4998fed8f_Colerove%20Media%20Logo.svg"
          # Headshot
          IMAGES["logan-headshot.jpg"]="https://cdn.prod.website-files.com/60a938bc0e890bb09b993113/65210be093d6496c0eaad1bf_new.jpg"
          # Portfolio thumbnails
          IMAGES["thumb-ignis.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f766a5cf4096846876b0b9_66f395631f69c0b5e15ea8cb_thumb%2520(15).jpeg"
          IMAGES["thumb-nonprofit-explainer.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f766a78efb70416dfbc5e3_66f39a3fbb4f17d6a49c7a7d_thumb%2520(16).jpeg"
          IMAGES["thumb-arctic.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f7669e8cb2eb2e8fc0a7c2_66f38750bb92e144accdf66a_thumb%2520(12).jpeg"
          IMAGES["thumb-foundation-mgmt.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f7669dd295dfbc1cbbe18b_66f39db88064b690b62d25d8_thumb%2520(20).jpeg"
          IMAGES["thumb-painted-hills.jpg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f768eb0871ede95f20f300_upda.jpg"
          IMAGES["thumb-not-jumping-ship.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f766a34de84b6e9187129a_66f3a2d9b15c5e16d5e607e8_thumb%2520(6).jpeg"
          IMAGES["thumb-enhancing-habitats.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f7669ef33ba04f968e6c6a_66f39e494c785c3ecb9e429b_thumb%2520(21).jpeg"
          IMAGES["thumb-foundant-brand.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f766a0d295dfbc1cbbe46f_66f70b897f8b1cdbe74e2e5b_thumb%2520(33).jpeg"
          IMAGES["thumb-girls-on-the-run.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f766a040c43375f10d2464_66f3a054163f4c9d22ba6356_thumb%2520(22).jpeg"
          IMAGES["thumb-grassland-initiative.jpg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/67fa91f6159f177fd199707a_thumb%20(8).jpg"
          IMAGES["thumb-drone-reel.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f766a040c43375f10d2415_66f39b9106d16f7bebe5a521_thumb%2520(18).jpeg"
          IMAGES["thumb-iceland.jpg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/6754f34a0ccac304599e4a4c_iceland%20no%20vin-3.jpg"
          IMAGES["thumb-someday-ranch.jpeg"]="https://cdn.prod.website-files.com/64488adc835c279b756c4fe2/66f766a51971e98896ddd771_66f71726105adea3df43b0ce_thumb%2520(44).jpeg"
