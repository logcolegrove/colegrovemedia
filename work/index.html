<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Colegrove Media</title>
<meta name="description" content="Browse brand videos, animations, drone films, testimonials, product demos, real estate and more from Colegrove Media — Bozeman, MT.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/css/global.css">
<style>
body{font-size:18px;}
.work-grid{grid-template-columns:repeat(3,1fr);}
.wi-content{padding:20px 22px;}
.wi-tag{font-size:11px;margin-bottom:8px;}
.wi-title{font-size:16px;}
.wi-client{margin-top:3px;}
.wi-play-btn,.wi-expand-btn{width:52px;height:52px;}

.filter-bar{padding:24px 40px 0;border-bottom:1px solid var(--border);}
.filter-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-bottom:16px;}
.filter-row.tier2{padding-top:4px;padding-bottom:0;max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.22,1,0.36,1),padding 0.3s ease;}
.filter-row.tier2.open{max-height:120px;padding-bottom:16px;}
.filter-label{font-size:12px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-right:4px;white-space:nowrap;flex-shrink:0;}
.filter-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:100px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.18s;font-family:var(--sans);white-space:nowrap;line-height:1;}
.filter-btn:hover{color:var(--white);border-color:rgba(0,242,166,0.4);}
.filter-btn.active{background:var(--teal);color:#0d1117;border-color:var(--teal);font-weight:600;}
.filter-btn.sub.active{background:rgba(0,242,166,0.12);color:var(--teal);border-color:rgba(0,242,166,0.4);font-weight:600;}
.results-bar{padding:18px 40px;display:flex;align-items:center;justify-content:space-between;}
.results-count{font-size:14px;color:var(--muted);}
.portfolio-wrap{padding:0 40px 80px;}
.load-more-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding-top:40px;}
.load-more-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:13px 36px;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.18s;font-family:var(--sans);}
.load-more-btn:hover{color:var(--white);border-color:rgba(0,242,166,0.4);}
.load-more-info{font-size:14px;color:var(--muted);}
.cta-band{margin:0 40px 80px;}

@media(max-width:960px){
  .filter-bar,.results-bar,.portfolio-wrap{padding-left:24px;padding-right:24px;}
  .cta-band{margin-left:24px;margin-right:24px;}
  .work-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:640px){
  .work-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="site-nav" data-active="work"></div>

<div class="page-hero">
  <div class="eyebrow reveal">Portfolio</div>
  <h1 class="page-h1 reveal">Past Projects</h1>
  <p class="page-desc reveal">Brand videos, animations, drone films, testimonials, product demos, real estate, and more — everything in one place.</p>
</div>

<div class="filter-bar reveal">
  <div class="filter-row" id="tier1">
    <span class="filter-label">Category</span>
    <button class="filter-btn active" data-cat="all" onclick="setCat('all')">All</button>
    <button class="filter-btn" data-cat="video" onclick="setCat('video')">Video</button>
    <button class="filter-btn" data-cat="animation" onclick="setCat('animation')">Animation</button>
    <button class="filter-btn" data-cat="photo" onclick="setCat('photo')">Photo</button>
    <button class="filter-btn" data-cat="design" onclick="setCat('design')">Design</button>
  </div>
  <div class="filter-row tier2" id="tier2"><span class="filter-label">Type</span></div>
</div>

<div class="results-bar"><span class="results-count" id="results-count"></span></div>

<div class="portfolio-wrap">
  <div class="work-grid" id="work-grid"></div>
  <div class="load-more-wrap" id="load-more-wrap" style="display:none;">
    <button class="load-more-btn" onclick="loadMore()">Load More</button>
    <span class="load-more-info" id="load-more-info"></span>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="handleBackdropClick(event)">
  <div class="modal" id="modal">
    <div class="modal-left" id="modal-left"></div>
    <div class="modal-right">
      <div class="modal-header"><span class="modal-vtag" id="modal-tag"></span><div class="modal-close" onclick="closeModal()"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="var(--muted)" stroke-width="1.5" stroke-linecap="round"><path d="M1 1l12 12M13 1L1 13"/></svg></div></div>
      <div class="modal-title" id="modal-title"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-divider"></div>
      <div class="modal-specs" id="modal-specs"></div>
      <div class="modal-divider"></div>
      <div class="modal-cta">
        <a href="/brief" class="modal-btn-fill" id="modal-cta-primary">Get a Quote →</a>
        <a href="/pricing" class="modal-btn-ghost" id="modal-cta-secondary">See Pricing</a>
      </div>
    </div>
  </div>
</div>

<div class="cta-band reveal">
  <div class="cta-band-h">Ready to make your<br><span>next project?</span></div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <a href="/brief" class="btn-fill">Get a Quote →</a>
    <a href="/brief" class="btn-ghost">Start a Project Brief</a>
  </div>
</div>

<div id="site-footer"></div>

<script src="/assets/js/portfolio-data.js"></script>
<script src="/assets/js/components.js"></script>
<script src="/assets/js/shared.js"></script>
<script>
/* ── WORK PAGE — reads from shared PORTFOLIO data ── */
var curCat='all',curType='all',shown=12,PER_PAGE=12;

function getFiltered(){
  return PORTFOLIO.filter(function(w){
    if(curCat!=='all'&&w.cat!==curCat) return false;
    if(curType!=='all'&&w.type!==curType) return false;
    return true;
  });
}

function setCat(cat){
  curCat=cat;curType='all';shown=PER_PAGE;
  document.querySelectorAll('#tier1 .filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.cat===cat);});
  var t2=document.getElementById('tier2');t2.innerHTML='<span class="filter-label">Type</span>';
  if(cat!=='all'&&SUBTYPES[cat]){t2.classList.add('open');var allBtn=document.createElement('button');allBtn.className='filter-btn sub active';allBtn.dataset.type='all';allBtn.textContent='All';allBtn.onclick=function(){setType('all');};t2.appendChild(allBtn);SUBTYPES[cat].forEach(function(s){var b=document.createElement('button');b.className='filter-btn sub';b.dataset.type=s.type;b.textContent=s.label;b.onclick=function(){setType(s.type);};t2.appendChild(b);});}else{t2.classList.remove('open');}
  render();
}
function setType(type){curType=type;shown=PER_PAGE;document.querySelectorAll('#tier2 .filter-btn').forEach(function(b){b.classList.toggle('active',b.dataset.type===type);});render();}
function loadMore(){shown+=PER_PAGE;render(true);}

function render(append){
  var filtered=getFiltered();var grid=document.getElementById('work-grid');var page=filtered.slice(0,shown);
  if(!append)grid.innerHTML='';var start=append?grid.children.length:0;
  page.slice(start).forEach(function(w){grid.appendChild(makeCard(w));});
  document.getElementById('results-count').textContent=filtered.length+' project'+(filtered.length===1?'':'s');
  var lmw=document.getElementById('load-more-wrap');
  if(shown<filtered.length){lmw.style.display='flex';document.getElementById('load-more-info').textContent='Showing '+Math.min(shown,filtered.length)+' of '+filtered.length;}else{lmw.style.display='none';}
}

function makeCard(w){
  var el=document.createElement('div');el.className='work-item'+(w.coming?' coming-soon':'');
  if(w.coming){el.innerHTML='<div class="coming-soon-inner"><div class="cs-icon">'+(CS_ICONS[w.type]||'')+'</div><div class="cs-service">'+w.title+'</div><div class="cs-label">Coming Soon</div></div>';}
  else{
    var isStatic=(w.cat==='photo'||w.cat==='design');var isLottie=!!w.lottieUrl;
    if(isLottie){var lid='lottie-card-'+w.slug;el.innerHTML='<div id="'+lid+'" style="position:absolute;inset:0;width:100%;height:100%;"></div><div class="wi-gradient"></div><div class="wi-content"><div class="wi-tag">'+w.typeLabel+'</div><div class="wi-title">'+w.title+'</div>'+(w.client?'<div class="wi-client">'+w.client+'</div>':'')+'</div>';el.onclick=function(){openModal(w.slug);};setTimeout(function(){var c=document.getElementById(lid);if(c&&typeof lottie!=='undefined'){lottie.loadAnimation({container:c,renderer:'svg',loop:false,autoplay:true,path:w.lottieUrl});}},100);}
    else{var btn=isStatic?'<div class="wi-expand-btn"><svg width="18" height="18" viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="7" height="7" rx="1.5" fill="rgba(0,242,166,0.95)"/><rect x="10" y="1" width="7" height="7" rx="1.5" fill="rgba(0,242,166,0.95)"/><rect x="1" y="10" width="7" height="7" rx="1.5" fill="rgba(0,242,166,0.95)"/><rect x="10" y="10" width="7" height="7" rx="1.5" fill="rgba(0,242,166,0.95)"/></svg></div>':'<div class="wi-play-btn"><svg width="14" height="16" viewBox="0 0 14 16" fill="none"><path d="M1 1.5L13 8L1 14.5V1.5Z" fill="rgba(0,242,166,0.95)"/></svg></div>';el.innerHTML='<img class="wi-thumb" src="'+w.thumb+'" alt="'+w.title+'" loading="lazy" style="object-position:'+(w.thumbPosition||'center center')+'">'+'<div class="wi-gradient"></div>'+btn+'<div class="wi-content"><div class="wi-tag">'+w.typeLabel+'</div><div class="wi-title">'+w.title+'</div>'+(w.client?'<div class="wi-client">'+w.client+'</div>':'')+'</div>';el.onclick=function(){openModal(w.slug);};}
  }
  return el;
}

/* ── MODAL ── */
var galleryIdx=0;var _lottieAnim=null;var _lottieLooping=true;var _lottieScrubbing=false;var _lottieThumbAnims=[];

function openModal(slug){
  var w=findProject(slug);if(!w||w.coming)return;
  document.getElementById('modal-tag').textContent=w.typeLabel;document.getElementById('modal-title').textContent=w.title;document.getElementById('modal-desc').textContent=w.desc;
  document.getElementById('modal-specs').innerHTML=w.specs.map(function(s){return '<div class="modal-spec"><span class="modal-spec-k">'+s.k+'</span><span class="modal-spec-v">'+s.v+'</span></div>';}).join('');
  var dividers=document.querySelectorAll('.modal-divider');if(dividers[1])dividers[1].style.display=w.specs.length?'':'none';
  var ctaEl=document.getElementById('modal-cta-primary');if(ctaEl){ctaEl.textContent=w.cta||TYPE_CTA[w.type]||'Get a Quote →';ctaEl.href=w.ctaHref||'/brief';}
  var ml=document.getElementById('modal-left');ml.innerHTML='';
  var isLottie=!!w.lottieUrl;var isStatic=(w.cat==='photo'||w.cat==='design');
  if(isLottie)buildLottieModal(w,ml);else if(isStatic)buildStaticModal(w,ml);else buildVideoModal(w,ml);
  document.getElementById('modal').classList.toggle('modal-vertical', !!w.vertical);
  document.getElementById('modal-backdrop').classList.add('open');document.body.style.overflow='hidden';
}

function buildVideoModal(w,ml){var emb=document.createElement('div');emb.className='modal-embed';var ifr=document.createElement('iframe');ifr.src='https://player.vimeo.com/video/'+w.vimeoId+'?autoplay=1&title=0&byline=0&portrait=0&color=00f2a6';ifr.setAttribute('allow','autoplay; fullscreen; picture-in-picture');ifr.setAttribute('allowfullscreen','');emb.appendChild(ifr);ml.appendChild(emb);var related=getRelatedProjects(w.slug,w.type,3);if(related.length){var rel=document.createElement('div');rel.className='modal-related';var lbl=document.createElement('div');lbl.className='modal-related-label';lbl.textContent='More '+w.typeLabel+'s';rel.appendChild(lbl);related.forEach(function(r){var d=document.createElement('div');d.className='modal-rel-item';d.onclick=function(){openModal(r.slug);};d.innerHTML='<img src="'+r.thumb+'" alt="" loading="lazy"><div><div class="modal-rel-title">'+r.title+'</div><div class="modal-rel-tag">'+r.typeLabel+'</div></div>';rel.appendChild(d);});ml.appendChild(rel);}}

function buildStaticModal(w,ml){
  var preview=document.createElement('div');preview.className='modal-preview';var mainDiv=document.createElement('div');mainDiv.className='modal-preview-main';
  if(w.images&&w.images.length){galleryIdx=0;var img=document.createElement('img');img.src=w.images[0];img.alt=w.title;var probe=new Image();probe.onload=function(){mainDiv.style.aspectRatio=probe.naturalWidth>probe.naturalHeight?'16/9':'3/4';};probe.src=w.images[0];mainDiv.appendChild(img);var counter=document.createElement('div');counter.className='gallery-counter';counter.id='gallery-counter';counter.textContent='1 / '+w.images.length;mainDiv.appendChild(counter);if(w.images.length>1){var prev=document.createElement('div');prev.className='gallery-arrow prev';prev.innerHTML='&#8249;';prev.onclick=function(){shiftGallery(-1);};var next=document.createElement('div');next.className='gallery-arrow next';next.innerHTML='&#8250;';next.onclick=function(){shiftGallery(1);};mainDiv.appendChild(prev);mainDiv.appendChild(next);}preview.appendChild(mainDiv);if(w.images.length>1){var strip=document.createElement('div');strip.className='modal-gallery-strip';w.images.forEach(function(src,i){var t=document.createElement('img');t.className='gthumb'+(i===0?' active':'');t.src=src;t.alt='';t.onclick=(function(idx){return function(){setGalleryImg(idx);};})(i);strip.appendChild(t);});preview.appendChild(strip);}}else{mainDiv.innerHTML=placeholderSVG(w.type);preview.appendChild(mainDiv);}
  ml.appendChild(preview);if(w.related!==false){var related=getRelatedByCategory(w.slug,w.cat,3);if(related.length){var rel=document.createElement('div');rel.className='modal-related';var lbl=document.createElement('div');lbl.className='modal-related-label';lbl.textContent='Other '+capitalise(w.cat)+' Services';rel.appendChild(lbl);related.forEach(function(r){var d=document.createElement('div');d.className='modal-rel-item';if(!r.coming)d.onclick=function(){openModal(r.slug);};var thumbHtml=r.thumb?'<img src="'+r.thumb+'" alt="" loading="lazy">':'<div style="width:76px;height:46px;border-radius:5px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--teal);">'+(CS_ICONS[r.type]||'')+'</div>';d.innerHTML=thumbHtml+'<div><div class="modal-rel-title">'+r.typeLabel+'</div><div class="modal-rel-tag">'+(r.coming?'Coming Soon':'View project')+'</div></div>';rel.appendChild(d);});ml.appendChild(rel);}}
}

function buildLottieModal(w,ml){
  if(_lottieAnim){_lottieAnim.destroy();_lottieAnim=null;}_lottieThumbAnims.forEach(function(a){try{a.destroy();}catch(e){}});_lottieThumbAnims=[];
  var files=w.lottieFiles||[{url:w.lottieUrl}];var curFile=0;var wrap=document.createElement('div');wrap.className='modal-lottie';
  var playerDiv=document.createElement('div');playerDiv.className='modal-lottie-player';var animContainer=document.createElement('div');animContainer.id='lottie-anim-container';playerDiv.appendChild(animContainer);wrap.appendChild(playerDiv);
  if(files.length>1){var strip=document.createElement('div');strip.className='lottie-thumb-strip';files.forEach(function(f,i){var thumb=document.createElement('div');thumb.className='lottie-thumb'+(i===0?' active':'');thumb.id='lottie-tw-'+i;var inner=document.createElement('div');inner.id='lottie-t-'+i;thumb.appendChild(inner);thumb.onclick=(function(idx){return function(){switchLottie(idx);};})(i);strip.appendChild(thumb);});wrap.appendChild(strip);}
  var playing=true;var PLAY_I='<svg width="10" height="12" viewBox="0 0 10 12" fill="none"><path d="M1 1L9 6L1 11V1Z" fill="rgba(0,242,166,0.9)"/></svg>';var PAUSE_I='<svg width="10" height="12" viewBox="0 0 10 12" fill="none"><rect x="1" y="1" width="3" height="10" fill="rgba(0,242,166,0.9)"/><rect x="6" y="1" width="3" height="10" fill="rgba(0,242,166,0.9)"/></svg>';
  var controls=document.createElement('div');controls.className='lottie-controls';
  function makeNav(html,dir){var b=document.createElement('div');b.className='lottie-nav-btn';b.innerHTML=html;b.onclick=function(){switchLottie(((curFile+dir)+files.length)%files.length);};return b;}
  var playBtn=document.createElement('div');playBtn.className='lottie-play-btn';playBtn.innerHTML=PLAY_I;
  var scrubber=document.createElement('input');scrubber.type='range';scrubber.className='lottie-scrubber';scrubber.min=0;scrubber.max=1000;scrubber.value=0;
  var loopBtn=document.createElement('button');loopBtn.className='lottie-loop-btn active';loopBtn.textContent='Loop';
  if(files.length>1)controls.appendChild(makeNav('&#8249;',-1));controls.appendChild(playBtn);controls.appendChild(scrubber);controls.appendChild(loopBtn);if(files.length>1)controls.appendChild(makeNav('&#8250;',1));
  wrap.appendChild(controls);ml.appendChild(wrap);
  function loadMain(idx){if(_lottieAnim){_lottieAnim.destroy();_lottieAnim=null;}var c=document.getElementById('lottie-anim-container');if(!c)return;c.innerHTML='';playing=true;playBtn.innerHTML=PLAY_I;scrubber.value=0;files.forEach(function(_,i){var tw=document.getElementById('lottie-tw-'+i);if(tw)tw.classList.toggle('active',i===idx);});_lottieAnim=lottie.loadAnimation({container:c,renderer:'svg',loop:_lottieLooping,autoplay:true,path:files[idx].url});_lottieAnim.addEventListener('enterFrame',function(){if(_lottieScrubbing)return;scrubber.value=Math.round((_lottieAnim.currentFrame/(_lottieAnim.totalFrames||1))*1000);});}
  function switchLottie(idx){curFile=idx;loadMain(idx);}window.shiftLottie=function(dir){switchLottie(((curFile+dir)+files.length)%files.length);};
  playBtn.onclick=function(){if(!_lottieAnim)return;if(playing){_lottieAnim.pause();playing=false;playBtn.innerHTML=PAUSE_I;}else{_lottieAnim.play();playing=true;playBtn.innerHTML=PLAY_I;}};
  scrubber.addEventListener('mousedown',function(){_lottieScrubbing=true;if(_lottieAnim){_lottieAnim.pause();playing=false;playBtn.innerHTML=PAUSE_I;}});
  scrubber.addEventListener('input',function(){if(_lottieAnim)_lottieAnim.goToAndStop(Math.round((scrubber.value/1000)*(_lottieAnim.totalFrames||1)),true);});
  scrubber.addEventListener('mouseup',function(){_lottieScrubbing=false;});scrubber.addEventListener('touchend',function(){_lottieScrubbing=false;});
  loopBtn.onclick=function(){_lottieLooping=!_lottieLooping;if(_lottieAnim)_lottieAnim.loop=_lottieLooping;loopBtn.classList.toggle('active',_lottieLooping);};
  setTimeout(function(){loadMain(0);files.forEach(function(f,i){var tc=document.getElementById('lottie-t-'+i);if(!tc)return;var a=lottie.loadAnimation({container:tc,renderer:'svg',loop:false,autoplay:false,path:f.url});a.addEventListener('DOMLoaded',function(){a.goToAndStop(Math.round(a.totalFrames*0.85),true);});_lottieThumbAnims.push(a);});},50);
  var related=getRelatedProjects(w.slug,w.type,3);if(related.length){var rel=document.createElement('div');rel.className='modal-related';var lbl=document.createElement('div');lbl.className='modal-related-label';lbl.textContent='More '+w.typeLabel+'s';rel.appendChild(lbl);related.forEach(function(r){var d=document.createElement('div');d.className='modal-rel-item';d.onclick=function(){openModal(r.slug);};d.innerHTML='<img src="'+(r.thumb||'')+'" alt="" loading="lazy"><div><div class="modal-rel-title">'+r.title+'</div><div class="modal-rel-tag">'+r.typeLabel+'</div></div>';rel.appendChild(d);});ml.appendChild(rel);}
}

function setGalleryImg(i){galleryIdx=i;var mainImg=document.querySelector('.modal-preview-main img');var mainDiv=document.querySelector('.modal-preview-main');var thumbs=document.querySelectorAll('.gthumb');var counter=document.getElementById('gallery-counter');if(mainImg&&thumbs[i]){mainImg.classList.add('fading');var newSrc=thumbs[i].src;var probe=new Image();probe.onload=function(){if(mainDiv)mainDiv.style.aspectRatio=probe.naturalWidth>probe.naturalHeight?'16/9':'3/4';mainImg.src=newSrc;mainImg.classList.remove('fading');};probe.src=newSrc;}thumbs.forEach(function(t,j){t.classList.toggle('active',j===i);});if(thumbs[i])thumbs[i].scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});if(counter)counter.textContent=(i+1)+' / '+thumbs.length;}
function shiftGallery(dir){var thumbs=document.querySelectorAll('.gthumb');if(!thumbs.length)return;setGalleryImg((galleryIdx+dir+thumbs.length)%thumbs.length);}

function closeModal(){document.getElementById('modal-backdrop').classList.remove('open');document.getElementById('modal-left').innerHTML='';if(_lottieAnim){_lottieAnim.destroy();_lottieAnim=null;}_lottieThumbAnims.forEach(function(a){try{a.destroy();}catch(e){}});_lottieThumbAnims=[];document.body.style.overflow='';}

(function(){var startX=0,startY=0;document.addEventListener('touchstart',function(e){var ml=document.getElementById('modal-left');if(!ml||!ml.querySelector('.modal-preview-main'))return;startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});document.addEventListener('touchend',function(e){var ml=document.getElementById('modal-left');if(!ml||!ml.querySelector('.modal-preview-main'))return;var dx=startX-e.changedTouches[0].clientX;var dy=Math.abs(startY-e.changedTouches[0].clientY);if(Math.abs(dx)>40&&dy<60){shiftGallery(dx>0?1:-1);}},{passive:true});})();
function handleBackdropClick(e){if(e.target===document.getElementById('modal-backdrop'))closeModal();}
document.addEventListener('keydown',function(e){var backdrop=document.getElementById('modal-backdrop');if(!backdrop||!backdrop.classList.contains('open'))return;if(e.key==='Escape')closeModal();else if(e.key==='ArrowRight'){if(_lottieAnim&&window.shiftLottie)shiftLottie(1);else shiftGallery(1);}else if(e.key==='ArrowLeft'){if(_lottieAnim&&window.shiftLottie)shiftLottie(-1);else shiftGallery(-1);}});

render();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
</body>
</html>
